<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday はじめまして先生 | Message Wall</title>
  <style>
    :root {
      --red: #8f1f24;
      --red-deep: #5f1218;
      --red-soft: #b84d50;
      --gold: #c69a3c;
      --gold-soft: #ecd49a;
      --gold-pale: #f8e8b8;
      --cream: #fff7e8;
      --cream-deep: #f3dfba;
      --blue: #b9d7e8;
      --blue-soft: #e9f5fb;
      --blue-mist: #d9edf5;
      --ink: #331e20;
      --muted: #765f5b;
      --paper: rgba(255, 252, 244, 0.92);
      --line: rgba(143, 31, 36, 0.15);
      --shadow: 0 18px 40px rgba(80, 30, 25, 0.12), 0 2px 8px rgba(198, 154, 60, 0.1);
      --shadow-strong: 0 24px 70px rgba(80, 30, 25, 0.18);
      --serif: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
      --sans: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--cream);
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.85;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at 13% 5%, rgba(185, 215, 232, 0.82) 0 11rem, transparent 27rem),
        radial-gradient(circle at 88% 7%, rgba(236, 212, 154, 0.62) 0 10rem, transparent 24rem),
        radial-gradient(circle at 80% 72%, rgba(143, 31, 36, 0.09) 0 9rem, transparent 24rem),
        linear-gradient(135deg, var(--cream) 0%, #fffaf0 43%, var(--blue-soft) 100%);
      min-height: 100vh;
      overflow-x: hidden;
      font-feature-settings: "palt";
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(90deg, rgba(143, 31, 36, 0.28) 1px, transparent 1px),
        linear-gradient(rgba(198, 154, 60, 0.24) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, black, transparent 80%);
    }

    .page {
      position: relative;
      z-index: 1;
    }

    .hero {
      position: relative;
      min-height: 80vh;
      display: grid;
      place-items: center;
      padding: 82px 22px 64px;
      text-align: center;
      overflow: hidden;
      background:
      background:
        linear-gradient(rgba(255, 247, 232, 0.62), rgba(255, 247, 232, 0.88)),
        url("./hero.jpg") center / cover no-repeat;
      border-bottom: 1px solid rgba(198, 154, 60, 0.38);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 999px;
    }

    .hero::before {
      width: min(58vw, 680px);
      height: min(58vw, 680px);
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(198, 154, 60, 0.3);
      box-shadow:
        inset 0 0 0 18px rgba(255, 247, 232, 0.38),
        inset 0 0 0 20px rgba(143, 31, 36, 0.08);
    }

    .hero::after {
      inset: auto 8vw 32px 8vw;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(198, 154, 60, 0.65), rgba(143, 31, 36, 0.45), rgba(198, 154, 60, 0.65), transparent);
    }

    .hero__inner {
      width: min(1020px, 100%);
      position: relative;
      z-index: 1;
      padding: clamp(42px, 7vw, 86px) 24px;
    }

    .hero__inner::selection,
    .card::selection,
    .gratitude::selection {
      background: rgba(198, 154, 60, 0.28);
    }

    .hero__inner::before,
    .hero__inner::after {
      content: "";
      display: block;
      width: min(520px, 66vw);
      height: 1px;
      margin: 0 auto;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-pale), var(--red), var(--gold-pale), var(--gold), transparent);
    }

    .hero__inner::before {
      margin-bottom: clamp(28px, 5vw, 48px);
    }

    .hero__inner::after {
      margin-top: clamp(28px, 5vw, 48px);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(0.78rem, 1.7vw, 0.92rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin: 0;
      color: var(--red-deep);
      font-family: var(--serif);
      font-size: clamp(2.85rem, 9.2vw, 7.4rem);
      font-weight: 500;
      letter-spacing: 0;
      line-height: 1.08;
      text-wrap: balance;
      text-shadow: 0 8px 32px rgba(95, 18, 24, 0.13), 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    h1 span {
      display: block;
      margin-top: 0.12em;
      color: var(--ink);
      font-size: clamp(2rem, 5.8vw, 4.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
    }

    .hero__lead {
      width: min(720px, 100%);
      margin: 30px auto 0;
      color: var(--muted);
      font-family: var(--serif);
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      line-height: 2;
      letter-spacing: 0.09em;
      text-wrap: balance;
    }

    .hero__lead span {
      display: inline-block;
    }

    .count-section {
      padding: 46px 20px 24px;
    }

    .count-panel {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 32px;
      background: rgba(255, 252, 244, 0.56);
      border: 1px solid rgba(198, 154, 60, 0.32);
      border-radius: 999px;
      box-shadow: 0 10px 34px rgba(80, 30, 25, 0.07);
    }

    .count-label {
      margin: 0;
      color: var(--muted);
      font-family: var(--serif);
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      letter-spacing: 0.1em;
    }

    .message-count {
      color: var(--red);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      font-variant-numeric: lining-nums tabular-nums;
      white-space: nowrap;
    }

    .message-count small {
      display: inline-block;
      margin-left: 0.34em;
      color: var(--gold);
      font-family: var(--sans);
      font-size: 0.31em;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      vertical-align: 0.18em;
    }

    .wall {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 38px 22px 98px;
      column-count: 3;
      column-gap: 26px;
    }

    .card {
      position: relative;
      display: inline-block;
      width: 100%;
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 26px;
      padding: 30px 28px 28px;
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.7), transparent 46%),
        linear-gradient(180deg, rgba(248, 232, 184, 0.2), transparent 45%),
        var(--paper);
      border: 1px solid rgba(198, 154, 60, 0.34);
      border-radius: 16px;
      box-shadow: var(--shadow);
      transform: translateZ(0);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(143, 31, 36, 0.11);
      border-radius: 11px;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      right: 20px;
      top: 18px;
      width: 42px;
      height: 42px;
      border-top: 1px solid rgba(198, 154, 60, 0.45);
      border-right: 1px solid rgba(198, 154, 60, 0.45);
      border-radius: 0 11px 0 0;
      pointer-events: none;
    }

    .card:nth-child(4n + 2) {
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.78), transparent 48%),
        linear-gradient(180deg, rgba(217, 237, 245, 0.48), transparent 58%),
        #f4fbff;
      border-color: rgba(185, 215, 232, 0.86);
    }

    .card:nth-child(4n + 3) {
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.64), transparent 48%),
        linear-gradient(180deg, rgba(184, 77, 80, 0.08), transparent 52%),
        #fff5f0;
    }

    .card:nth-child(4n + 4) {
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.72), transparent 48%),
        linear-gradient(180deg, rgba(248, 232, 184, 0.34), transparent 54%),
        #fffaf0;
    }

    .card:nth-child(5n) {
      padding-bottom: 38px;
    }

    .card:nth-child(6n + 2) {
      margin-top: 10px;
    }

    .card:nth-child(7n + 4) {
      margin-top: 18px;
    }

    .card__name {
      position: relative;
      margin: 0 0 16px;
      padding: 0 42px 13px 0;
      color: var(--red-deep);
      font-family: var(--serif);
      font-size: 1.08rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .card__name::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 72px;
      height: 1px;
      background: linear-gradient(90deg, var(--red), var(--gold), transparent);
    }

    .card__message {
      position: relative;
      margin: 0;
      color: #493332;
      font-family: var(--serif);
      font-size: 1rem;
      line-height: 2.02;
      letter-spacing: 0.04em;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    .empty {
      width: min(720px, calc(100% - 40px));
      margin: 20px auto 88px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 252, 244, 0.8);
      border: 1px dashed rgba(143, 31, 36, 0.24);
      border-radius: 14px;
    }

    .gratitude {
      padding: 2px 20px 76px;
    }

    .gratitude__panel {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: clamp(30px, 6vw, 56px) clamp(22px, 5vw, 62px);
      text-align: center;
      background:
        linear-gradient(135deg, rgba(255, 252, 244, 0.9), rgba(233, 245, 251, 0.78)),
        linear-gradient(90deg, transparent, rgba(198, 154, 60, 0.16), transparent);
      border: 1px solid rgba(198, 154, 60, 0.4);
      border-radius: 18px;
      box-shadow: var(--shadow-strong);
    }

    .gratitude__kicker {
      margin: 0 0 14px;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.8rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .gratitude__panel p {
      margin: 0;
      color: var(--red-deep);
      font-family: var(--serif);
      font-size: clamp(1.05rem, 2.6vw, 1.42rem);
      line-height: 2;
      letter-spacing: 0.08em;
    }

    .footer {
      padding: 58px 20px 66px;
      color: var(--cream);
      text-align: center;
      background:
        linear-gradient(135deg, rgba(95, 18, 24, 0.97), rgba(143, 31, 36, 0.94)),
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(255, 255, 255, 0.05) 28px 29px);
      border-top: 4px solid var(--gold);
    }

    .footer p {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      letter-spacing: 0.08em;
    }

    .footer p + p {
      margin-top: 12px;
      color: var(--gold-soft);
      font-size: clamp(0.92rem, 2vw, 1.04rem);
    }

    @media (max-width: 980px) {
      .wall {
        column-count: 2;
      }
    }

    @media (max-width: 760px) {
      .hero {
        min-height: 70vh;
        padding: 58px 16px 46px;
      }

      .hero::before {
        width: 92vw;
        height: 92vw;
        top: 43%;
      }

      .hero__inner {
        padding-inline: 8px;
      }

      .eyebrow {
        letter-spacing: 0.24em;
      }

      h1 span {
        letter-spacing: 0.04em;
      }

      .hero__lead span {
        display: block;
      }

      .count-panel {
        display: block;
        padding: 22px 18px;
        border-radius: 18px;
        text-align: center;
      }

      .message-count {
        display: block;
        margin-top: 12px;
      }

      .message-count small {
        display: block;
        margin: 8px 0 0;
        letter-spacing: 0.28em;
      }

      .wall {
        column-count: 1;
        padding-inline: 16px;
        padding-bottom: 72px;
      }

      .card {
        margin: 0 0 20px;
        padding: 27px 22px 24px;
        border-radius: 14px;
      }

      .card:nth-child(6n + 2),
      .card:nth-child(7n + 4) {
        margin-top: 0;
      }

      .card__name {
        padding-right: 32px;
      }

      .card__message {
        font-size: 0.98rem;
        line-height: 1.96;
      }

      .gratitude {
        padding-bottom: 54px;
      }

      .footer {
        padding-inline: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero__inner">
        <p class="eyebrow">Happy Birthday Message Wall</p>
        <h1>Happy Birthday <span>はじめまして先生</span></h1>

      </div>
    </header>

    <main>
      <section class="count-section" aria-label="メッセージ数">
        <div class="count-panel">
          <p class="count-label">AGK雑談会のみんなから</p>

        </div>

      <section class="wall" id="messageWall" aria-label="メッセージカード一覧"></section>
      <p class="empty" id="emptyState">CSVデータを埋め込むと、ここにメッセージカードが表示されます。</p>

      <section class="gratitude" aria-label="感謝のメッセージ">
        <div class="gratitude__panel">

          <p>いつも楽しい場をありがとうございます。<br>これからも、お茶と笑顔でつながる時間を楽しみにしています。</p>

    </main>

    <footer class="footer">
      <p>Happy Birthday, はじめまして先生</p>
      <p>AGK雑談会のみんなより、感謝とお祝いを込めて。</p>
    </footer>
  </div>

    function getMessages() {
      return messages
        .map((item) => ({
          name: String(item.name || "匿名").trim() || "匿名",
          message: String(item.message || "").trim(),
        }))
        .filter((item) => item.message !== "");
    }

    function renderMessages(messages) {
      const wall = document.getElementById("messageWall");
      const count = document.getElementById("messageCount");
      const emptyState = document.getElementById("emptyState");

      wall.innerHTML = "";
      count.textContent = messages.length;
      emptyState.hidden = messages.length > 0;

      messages.forEach((item) => {
        const card = document.createElement("article");
        const name = document.createElement("h2");
        const message = document.createElement("p");

        card.className = "card";
        card.setAttribute("aria-label", `${item.name}さんからのメッセージ`);
        name.className = "card__name";
        message.className = "card__message";
        name.textContent = item.name;
        message.textContent = item.message;

        card.append(name, message);
        wall.append(card);
      });
    }

    renderMessages(getMessages());
  </script>
